services:
  workspace:
    build:
      target: prod
    stdin_open: true
    tty: true
    command: sleep infinity
    volumes:
      - ./:/workspace
    ports:
      - "127.0.0.1:${JUPYTER_PORT:-8888}:8888"
    cpus: ${WORKSPACE_CPUS:-8}
    mem_limit: ${WORKSPACE_MEM_LIMIT:-32g}
    mem_reservation: ${WORKSPACE_MEM_RESERVATION:-16g}
    pids_limit: ${WORKSPACE_PIDS_LIMIT:-256}
    shm_size: ${WORKSPACE_SHM_SIZE:-2g}
    stop_grace_period: 30s

  sim-cpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        USERNAME: ${USERNAME:-clovis-caface}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    init: true
    working_dir: /workspace
    user: "${USERNAME:-clovis-caface}"
    command: ${SIM_COMMAND:-python run_scan.py}
    environment:
      HOME: /home/${USERNAME:-clovis-caface}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    cpus: ${SIM_CPU_CPUS:-12}
    mem_limit: ${SIM_CPU_MEM_LIMIT:-64g}
    mem_reservation: ${SIM_CPU_MEM_RESERVATION:-32g}
    pids_limit: ${SIM_CPU_PIDS_LIMIT:-256}
    shm_size: ${SIM_CPU_SHM_SIZE:-4g}
    stop_grace_period: 2m
    restart: "no"
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "3"
    profiles: ["cpu"]

  sim-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        USERNAME: ${USERNAME:-clovis-caface}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    init: true
    working_dir: /workspace
    user: "${USERNAME:-clovis-caface}"
    command: ${SIM_COMMAND:-python run_scan.py}
    environment:
      HOME: /home/${USERNAME:-clovis-caface}
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: ${GPU_DEVICE_ID:-0}
    volumes:
      - ./:/workspace
    cpus: ${SIM_GPU_CPUS:-16}
    mem_limit: ${SIM_GPU_MEM_LIMIT:-128g}
    mem_reservation: ${SIM_GPU_MEM_RESERVATION:-64g}
    pids_limit: ${SIM_GPU_PIDS_LIMIT:-256}
    shm_size: ${SIM_GPU_SHM_SIZE:-8g}
    stop_grace_period: 2m
    restart: "no"
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    profiles: ["gpu"]
