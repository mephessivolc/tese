services:
  latex:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    working_dir: /workspace
    environment:
      HOME: /home/vscode
      TEXMFVAR: /texlive-cache/texmf-var
      TEXMFCACHE: /texlive-cache/texmf-cache
    volumes:
      - ./:/workspace
      - texlive-cache:/texlive-cache

volumes:
  texlive-cache: