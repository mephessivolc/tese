services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USERNAME:-clovis-caface}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    init: true
    working_dir: /workspace
    user: "${USERNAME:-clovis-caface}"
    environment:
      HOME: /home/${USERNAME:-clovis-caface}
      PYTHONUNBUFFERED: "1"
      JUPYTER_ENABLE_LAB: "yes"
    restart: "no"
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"
