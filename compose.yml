name: tese

services:
  local:
    build:
      context: .
      dockerfile: Dockerfile
      target: local
      args:
        USERNAME: ${LOCAL_USER:-devuser}
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
    image: tese-local:latest
    init: true
    working_dir: /workspace
    command: sleep infinity
    environment:
      HOME: /home/${LOCAL_USER:-devuser}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONPATH: /workspace/code:/workspace/code/src:/workspace
      TEXMFVAR: /workspace/.texlive/texmf-var
      TEXMFCACHE: /workspace/.texlive/texmf-cache
    volumes:
      - .:/workspace

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
      args:
        USERNAME: ${LOCAL_USER:-devuser}
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
    image: tese-server:latest
    init: true
    working_dir: /workspace
    command: sleep infinity
    environment:
      HOME: /home/${LOCAL_USER:-devuser}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONPATH: /workspace/code:/workspace/code/src:/workspace
    volumes:
      - .:/workspace

    shm_size: ${SERVER_SHM_SIZE:-16g}
    mem_limit: ${SERVER_MEM_LIMIT:-128g}
    mem_reservation: ${SERVER_MEM_RESERVATION:-32g}
    cpus: ${SERVER_CPUS:-16.0}
    pids_limit: ${SERVER_PIDS_LIMIT:-4096}

    # Ative GPU só quando necessário
    # gpus: ${SERVER_GPUS:-all}