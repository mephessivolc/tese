name: tese

x-common-build: &common-build
  context: .
  dockerfile: Dockerfile
  args:
    USERNAME: ${LOCAL_USER:-clovis-caface}
    USER_UID: ${LOCAL_UID:-1000}
    USER_GID: ${LOCAL_GID:-1000}

x-common-env: &common-env
  HOME: /home/${LOCAL_USER:-clovis-caface}
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  VIRTUAL_ENV: /opt/venv
  PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  MPLCONFIGDIR: /home/${LOCAL_USER:-clovis-caface}/.cache/matplotlib
  PYTHONPATH: /workspace:/workspace/code:/workspace/code/src
  
services:
  local:
    build:
      <<: *common-build
      target: local
    image: tese-local:latest
    init: true
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      <<: *common-env
      TEXMFVAR: /workspace/.texlive/texmf-var
      TEXMFCACHE: /workspace/.texlive/texmf-cache
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true

  server:
    build:
      <<: *common-build
      target: server
    image: tese-server:latest
    init: true
    working_dir: /workspace
    command: ["python", "/workspace/code/src/teste.py"]
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - .:/workspace